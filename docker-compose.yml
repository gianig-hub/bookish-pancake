services:
  # ─── Frontend (Next.js) ───────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: ../../infra/docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://api:4000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    restart: unless-stopped

  # ─── API (Express) ────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: ../../infra/docker/Dockerfile.api
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://ekuser:ekpassword@postgres:5432/ekmarketplace
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # ─── Worker (Background Jobs) ─────────────────────────────────
  worker:
    build:
      context: ./apps/worker
      dockerfile: ../../infra/docker/Dockerfile.worker
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://ekuser:ekpassword@postgres:5432/ekmarketplace
    volumes:
      - ./apps/worker:/app
      - /app/node_modules
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ekuser
      POSTGRES_PASSWORD: ekpassword
      POSTGRES_DB: ekmarketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ─── Nginx (reverse proxy) ────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/sites:/etc/nginx/conf.d:ro
    depends_on:
      - web
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
