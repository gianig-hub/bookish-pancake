version: '3.9'

# Production reference — adjust resource limits and secrets management for your VPS
# Use docker secrets or a secrets manager instead of plain env_file in production

services:
  db:
    image: postgres:15-alpine
    container_name: ek_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ek_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - internal

  web:
    image: ghcr.io/your-org/ek-web:latest
    container_name: ek_web
    restart: always
    env_file:
      - .env.production
    networks:
      - internal
    depends_on:
      - api

  api:
    image: ghcr.io/your-org/ek-api:latest
    container_name: ek_api
    restart: always
    env_file:
      - .env.production
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy

  worker:
    image: ghcr.io/your-org/ek-worker:latest
    container_name: ek_worker
    restart: always
    env_file:
      - .env.production
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: ek_nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - internal
      - external
    depends_on:
      - web
      - api

volumes:
  db_data:
  redis_data:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
