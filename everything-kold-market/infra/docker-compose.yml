version: '3.9'

services:
  # --- PostgreSQL Database ---
  db:
    image: postgres:15-alpine
    container_name: ek_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ekuser
      POSTGRES_PASSWORD: ekpassword
      POSTGRES_DB: ekmarket
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ekuser -d ekmarket']
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: ek_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Web App (Next.js) ---
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    container_name: ek_web
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - api
    volumes:
      - ./apps/web:/app/apps/web
      - /app/apps/web/node_modules
      - /app/apps/web/.next

  # --- API (Express) ---
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: ek_api
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - /app/apps/api/node_modules

  # --- Worker ---
  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    container_name: ek_worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/worker:/app/apps/worker
      - /app/apps/worker/node_modules

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: ek_nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

volumes:
  db_data:
  redis_data:
