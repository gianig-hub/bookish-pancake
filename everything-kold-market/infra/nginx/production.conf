# EK Marketplace — Production Nginx Config
# Replace your-domain.co.uk with your actual domain
# Assumes Let's Encrypt TLS certificates

upstream web {
    server web:3000;
}

upstream api {
    server api:4000;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name your-domain.co.uk www.your-domain.co.uk;
    return 301 https://$host$request_uri;
}

# HTTPS — main site
server {
    listen 443 ssl http2;
    server_name your-domain.co.uk www.your-domain.co.uk;

    ssl_certificate     /etc/letsencrypt/live/your-domain.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.co.uk/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 10M;

    # --- Web App ---
    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # --- API ---
    location /api/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Health check (private) ---
    location /health {
        proxy_pass http://api/health;
        allow 127.0.0.1;
        deny all;
    }
}
