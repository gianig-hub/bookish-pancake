# =============================================================================
# koldmarket.conf — Site Configuration
# EK Marketplace / koldmarket.co.uk
#
# Three server blocks:
#   1. www.koldmarket.co.uk  → Next.js web (web:3000)
#   2. app.koldmarket.co.uk  → Next.js web (web:3000)
#   3. api.koldmarket.co.uk  → Express API (api:4000)
#
# This file is included by nginx.conf via the `include conf.d/*.conf` directive.
#
# HTTPS / SSL:
#   - For production, use Certbot (Let's Encrypt) to add SSL certificates.
#   - Once you have certs, add a listen 443 ssl block and redirect port 80 to 443.
#   - Example redirect to add when ready:
#       return 301 https://$host$request_uri;
# =============================================================================


# -----------------------------------------------------------------------------
# Shared proxy settings (used across all server blocks below)
# -----------------------------------------------------------------------------
# Define common proxy headers in a map so they don't need repeating.
# Nginx does not support shared location blocks directly, so we use a top-level
# map and set headers inline in each location below.

# Real IP forwarding: if Nginx is behind a load balancer or CDN, set
# set_real_ip_from <LB_CIDR>; and real_ip_header X-Forwarded-For;
# here at the http level (in nginx.conf) before going to production.


# =============================================================================
# 1. www.koldmarket.co.uk — Main marketplace website
#    Routes to the Next.js frontend (web service, port 3000)
# =============================================================================
server {
    listen  80;
    server_name  www.koldmarket.co.uk;

    # TODO: when SSL is ready, replace the block above with:
    # listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/www.koldmarket.co.uk/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/www.koldmarket.co.uk/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # -------------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------------
    # Prevent this page being embedded in iframes (clickjacking protection).
    add_header  X-Frame-Options         "SAMEORIGIN"            always;
    # Stop browsers guessing MIME types (reduces certain attack vectors).
    add_header  X-Content-Type-Options  "nosniff"               always;
    # Tell browsers not to send the referrer when crossing to HTTP origins.
    add_header  Referrer-Policy         "strict-origin-when-cross-origin" always;
    # Allow only resources from the same origin by default.
    # Loosen this in future once you have a Content Security Policy defined.
    add_header  X-XSS-Protection        "1; mode=block"         always;
    # TODO: add HSTS once HTTPS is working and stable:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # -------------------------------------------------------------------------
    # Upload limit (matches client_max_body_size in nginx.conf)
    # -------------------------------------------------------------------------
    client_max_body_size  5M;

    # -------------------------------------------------------------------------
    # Main proxy to Next.js
    # -------------------------------------------------------------------------
    location / {
        proxy_pass  http://web_backend;

        # Forward the original host and client IP to the app.
        proxy_set_header  Host               $host;
        proxy_set_header  X-Real-IP          $remote_addr;
        proxy_set_header  X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto  $scheme;

        # WebSocket support (required for Next.js hot-reload in dev and any
        # real-time features using ws:// in production).
        proxy_http_version  1.1;
        proxy_set_header    Upgrade     $http_upgrade;
        proxy_set_header    Connection  "upgrade";

        # Timeouts — increase if you see 504s on slow pages or API calls.
        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # Disable buffering for server-sent events / streaming responses.
        # Comment this out if you are serving large file downloads through Nginx.
        proxy_buffering  off;
    }
}


# =============================================================================
# 2. app.koldmarket.co.uk — Alternate / direct app access
#    Routes to the same Next.js frontend (web service, port 3000).
#    Useful as a separate entry point (e.g., authenticated dashboard area).
# =============================================================================
server {
    listen  80;
    server_name  app.koldmarket.co.uk;

    # TODO: add SSL block here once certs are in place (same pattern as above).

    # -------------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------------
    add_header  X-Frame-Options         "SAMEORIGIN"            always;
    add_header  X-Content-Type-Options  "nosniff"               always;
    add_header  Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header  X-XSS-Protection        "1; mode=block"         always;

    # -------------------------------------------------------------------------
    # Upload limit
    # -------------------------------------------------------------------------
    client_max_body_size  5M;

    # -------------------------------------------------------------------------
    # Main proxy to Next.js
    # -------------------------------------------------------------------------
    location / {
        proxy_pass  http://web_backend;

        proxy_set_header  Host               $host;
        proxy_set_header  X-Real-IP          $remote_addr;
        proxy_set_header  X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto  $scheme;

        # WebSocket support
        proxy_http_version  1.1;
        proxy_set_header    Upgrade     $http_upgrade;
        proxy_set_header    Connection  "upgrade";

        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        proxy_buffering  off;
    }
}


# =============================================================================
# 3. api.koldmarket.co.uk — Backend REST API
#    Routes to the Express API service (api:4000).
# =============================================================================
server {
    listen  80;
    server_name  api.koldmarket.co.uk;

    # TODO: add SSL block here once certs are in place.

    # -------------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------------
    add_header  X-Frame-Options         "DENY"                  always;
    add_header  X-Content-Type-Options  "nosniff"               always;
    add_header  Referrer-Policy         "no-referrer"           always;
    add_header  X-XSS-Protection        "1; mode=block"         always;

    # -------------------------------------------------------------------------
    # Upload limit — needed for image uploads via the API
    # -------------------------------------------------------------------------
    client_max_body_size  5M;

    # -------------------------------------------------------------------------
    # Proxy to Express API
    # -------------------------------------------------------------------------
    location / {
        proxy_pass  http://api_backend;

        proxy_set_header  Host               $host;
        proxy_set_header  X-Real-IP          $remote_addr;
        proxy_set_header  X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto  $scheme;

        # HTTP/1.1 required for keep-alive connections to the upstream.
        proxy_http_version  1.1;
        # Clear the Connection header so keep-alive is not passed upstream
        # in a way that breaks certain Express setups.
        proxy_set_header  Connection  "";

        # API requests can take longer (DB queries, AI calls, file processing).
        # Raise proxy_read_timeout if you add long-running endpoints.
        proxy_connect_timeout  10s;
        proxy_send_timeout     120s;
        proxy_read_timeout     120s;

        # Buffer settings for API responses.
        # Disable buffering for streamed/SSE responses; enable for regular JSON.
        proxy_buffering            on;
        proxy_buffer_size          8k;
        proxy_buffers              8 16k;
        proxy_busy_buffers_size    32k;
    }

    # -------------------------------------------------------------------------
    # Health check endpoint — used by load balancers and monitoring tools.
    # TODO: implement GET /health in the Express app returning 200 OK.
    # -------------------------------------------------------------------------
    location = /health {
        proxy_pass  http://api_backend;
        proxy_set_header  Host  $host;
        access_log  off;  # Suppress health-check noise in access logs
    }
}
