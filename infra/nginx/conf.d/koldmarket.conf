# ==============================================================================
# KoldMarket — Site Configuration
# Subdomains: www, app, api
# ==============================================================================
# Local development: add these to /etc/hosts to test:
#   127.0.0.1 www.koldmarket.co.uk
#   127.0.0.1 app.koldmarket.co.uk
#   127.0.0.1 api.koldmarket.co.uk
#
# Production: Replace HTTP blocks with HTTPS, add Let's Encrypt certs.
#   sudo certbot --nginx -d www.koldmarket.co.uk -d app.koldmarket.co.uk -d api.koldmarket.co.uk
# ==============================================================================

# ------------------------------------------------------------------------------
# Common proxy headers — included by each server block
# Shared settings for security headers, WebSocket upgrade, proxy pass config
# ------------------------------------------------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ==============================================================================
# www.koldmarket.co.uk — Primary marketplace web app (Next.js)
# ==============================================================================
server {
    listen 80;
    server_name www.koldmarket.co.uk;

    # TODO: In production, add redirect to HTTPS:
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://web_backend;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (required for Next.js hot reload in dev)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"        always;
        add_header X-Content-Type-Options "nosniff"           always;
        add_header X-XSS-Protection       "1; mode=block"     always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        # TODO: Enable HSTS after HTTPS is confirmed working:
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    }
}

# ==============================================================================
# app.koldmarket.co.uk — Alternate entry point for the web app
# Can later diverge (e.g. app = logged-in area, www = marketing)
# ==============================================================================
server {
    listen 80;
    server_name app.koldmarket.co.uk;

    # TODO: In production, add redirect to HTTPS:
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://web_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        add_header X-Frame-Options        "SAMEORIGIN"        always;
        add_header X-Content-Type-Options "nosniff"           always;
        add_header X-XSS-Protection       "1; mode=block"     always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }
}

# ==============================================================================
# api.koldmarket.co.uk — Backend API (Express)
# ==============================================================================
server {
    listen 80;
    server_name api.koldmarket.co.uk;

    # TODO: In production, add redirect to HTTPS:
    # return 301 https://$host$request_uri;

    # Slightly larger body size for API requests with file metadata
    client_max_body_size 5M;

    location / {
        proxy_pass http://api_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";  # HTTP keep-alive to upstream

        # Longer timeouts for AI endpoints that may take a few seconds
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Buffering settings for API responses
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;

        # Security headers
        add_header X-Frame-Options        "DENY"             always;
        add_header X-Content-Type-Options "nosniff"          always;
        add_header X-XSS-Protection       "1; mode=block"    always;
        add_header Referrer-Policy        "no-referrer"      always;
        # TODO: Enable after HTTPS:
        # add_header Strict-Transport-Security "max-age=63072000" always;
    }

    # Health check endpoint — no logging needed for monitoring pings
    location = /health {
        proxy_pass http://api_backend;
        access_log off;
    }
}

# ==============================================================================
# Localhost fallback (for docker-compose local testing without DNS)
# Access via http://localhost after docker-compose up
# ==============================================================================
server {
    listen 80 default_server;
    server_name localhost _;

    location /api/ {
        proxy_pass http://api_backend/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://web_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
