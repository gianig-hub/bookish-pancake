# EK Marketplace Nginx site configuration
# Handles routing for www.koldmarket.co.uk, app.koldmarket.co.uk, and api.koldmarket.co.uk
# 
# During development with docker-compose:
#   - Services are accessed via container names (web, api)
#   - To test locally, use: curl -H "Host: www.koldmarket.co.uk" http://localhost/
#
# For production:
#   - Change example.com to your actual domain
#   - Add SSL certificates (Let's Encrypt)
#   - Uncomment HTTPS redirect lines
#   - Update security headers as needed

# ============================================================================
# www.koldmarket.co.uk - Main marketplace website
# ============================================================================
server {
  listen 80;
  server_name www.koldmarket.co.uk;

  # Production: Redirect HTTP to HTTPS
  # Uncomment for production deployment
  # return 301 https://$server_name$request_uri;

  # ========================================================================
  # REVERSE PROXY TO WEB SERVICE
  # ========================================================================
  location / {
    # Proxy all requests to Next.js web service
    proxy_pass http://web_backend;

    # ====================================================================
    # PROXY HEADERS - Pass original request information to backend
    # ====================================================================
    # Pass the Host header
    proxy_set_header Host $host;
    # Pass the real client IP
    proxy_set_header X-Real-IP $remote_addr;
    # Pass all IPs in the chain for multiple proxies
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Pass the original protocol (http or https)
    proxy_set_header X-Forwarded-Proto $scheme;
    # Pass the original host requested
    proxy_set_header X-Forwarded-Host $server_name;

    # ====================================================================
    # WEBSOCKET SUPPORT
    # ====================================================================
    # Required for real-time features (live updates, notifications, etc)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # ====================================================================
    # PROXY TIMEOUTS
    # ====================================================================
    # Prevent timeout on long-running requests
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }

  # ========================================================================
  # SECURITY HEADERS
  # ========================================================================
  # Prevent embedding in iframes from other sites
  add_header X-Frame-Options "SAMEORIGIN" always;
  # Prevent browsers from MIME-sniffing
  add_header X-Content-Type-Options "nosniff" always;
  # Enable XSS protection in browsers
  add_header X-XSS-Protection "1; mode=block" always;
  # Control referrer information
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  
  # Production: Add Strict-Transport-Security after SSL is working
  # Uncomment only after HTTPS certificates are active
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # ========================================================================
  # FILE UPLOAD SIZE
  # ========================================================================
  # Max upload size for images, documents, etc (must match .env MAX_FILE_SIZE)
  # Currently set to 5MB - increase if larger files needed
  client_max_body_size 5M;
}

# ============================================================================
# app.koldmarket.co.uk - Alternative access to marketplace
# ============================================================================
# Can be same as www.koldmarket.co.uk or serve a different purpose
server {
  listen 80;
  server_name app.koldmarket.co.uk;

  # Production: Redirect HTTP to HTTPS
  # return 301 https://$server_name$request_uri;

  location / {
    proxy_pass http://web_backend;

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # File upload size
  client_max_body_size 5M;
}

# ============================================================================
# api.koldmarket.co.uk - API endpoint for marketplace
# ============================================================================
server {
  listen 80;
  server_name api.koldmarket.co.uk;

  # Production: Redirect HTTP to HTTPS
  # return 301 https://$server_name$request_uri;

  # ========================================================================
  # REVERSE PROXY TO API SERVICE
  # ========================================================================
  location / {
    # Proxy all requests to Express API service
    proxy_pass http://api_backend;

    # ====================================================================
    # PROXY HEADERS - Pass original request information to backend
    # ====================================================================
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;

    # ====================================================================
    # WEBSOCKET SUPPORT
    # ====================================================================
    # Some API endpoints may use WebSockets
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # ====================================================================
    # PROXY TIMEOUTS FOR API
    # ====================================================================
    # API operations may take longer (database queries, external API calls)
    # Adjust based on typical API response time
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    # ====================================================================
    # BUFFERING SETTINGS
    # ====================================================================
    # Buffer responses to prevent timeout on slow backends
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
  }

  # ========================================================================
  # SECURITY HEADERS FOR API
  # ========================================================================
  # These headers are important even for APIs
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-XSS-Protection "1; mode=block" always;
  
  # CORS is typically handled by the API itself, but Nginx can help
  # Uncomment if needed:
  # add_header Access-Control-Allow-Origin "*" always;

  # Production: Add Strict-Transport-Security after SSL is working
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # ========================================================================
  # FILE UPLOAD SIZE FOR API
  # ========================================================================
  # API may accept file uploads (product images, etc)
  client_max_body_size 5M;
}

# ============================================================================
# DEVELOPMENT NOTES
# ============================================================================
# 
# LOCAL TESTING:
#   With docker-compose, domains don't actually resolve.
#   Test with curl using Host headers:
#   
#   curl -H "Host: www.koldmarket.co.uk" http://localhost/
#   curl -H "Host: api.koldmarket.co.uk" http://localhost/api/health
#
# PRODUCTION SETUP:
#   1. Point DNS records to your server IP
#      www.koldmarket.co.uk A your.server.ip
#      app.koldmarket.co.uk A your.server.ip
#      api.koldmarket.co.uk A your.server.ip
#
#   2. Get SSL certificates (Let's Encrypt):
#      certbot certonly --standalone -d www.koldmarket.co.uk -d app.koldmarket.co.uk -d api.koldmarket.co.uk
#
#   3. Update config to use HTTPS and add certificates:
#      Replace "listen 80;" with:
#        listen 443 ssl http2;
#        ssl_certificate /etc/letsencrypt/live/www.koldmarket.co.uk/fullchain.pem;
#        ssl_certificate_key /etc/letsencrypt/live/www.koldmarket.co.uk/privkey.pem;
#
#   4. Uncomment the HTTP→HTTPS redirect:
#      return 301 https://$server_name$request_uri;
#
#   5. Uncomment HSTS header (after HTTPS is working):
#      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
