# ─────────────────────────────────────────────────────────────────────────────
# EK Marketplace — koldmarket.co.uk Nginx Site Configuration
#
# Subdomains:
#   www.koldmarket.co.uk  → Next.js web app (port 3000)
#   app.koldmarket.co.uk  → Next.js web app (port 3000)
#   api.koldmarket.co.uk  → Express API (port 4000)
#
# Development: For local testing use -H "Host: www.koldmarket.co.uk" with curl
#              or add entries to /etc/hosts pointing to 127.0.0.1
#
# Production:  Uncomment SSL server blocks after running certbot
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# www.koldmarket.co.uk — Main Marketplace (Next.js)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name www.koldmarket.co.uk;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upload limit (marketplace images)
    client_max_body_size 5m;

    location / {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;

        # WebSocket support (Next.js hot reload + real-time features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Static file caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://web_upstream;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
        expires 1d;
    }

    # Logging
    access_log /var/log/nginx/www.koldmarket.access.log;
    error_log /var/log/nginx/www.koldmarket.error.log;

    # To add SSL (production):
    # 1. Run: certbot --nginx -d www.koldmarket.co.uk
    # 2. Certbot will update this file automatically
    # 3. Or manually add SSL block below
}

# ─────────────────────────────────────────────────────────────────────────────
# app.koldmarket.co.uk — Alternative Web Access (Next.js)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name app.koldmarket.co.uk;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 5m;

    location / {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/app.koldmarket.access.log;
    error_log /var/log/nginx/app.koldmarket.error.log;
}

# ─────────────────────────────────────────────────────────────────────────────
# api.koldmarket.co.uk — REST API (Express)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.koldmarket.co.uk;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upload limit (listing images uploaded via API)
    client_max_body_size 5m;

    location / {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeout for AI endpoints (Phase 3+)
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # CORS handled by Express — do not add here to avoid duplicate headers
    }

    access_log /var/log/nginx/api.koldmarket.access.log;
    error_log /var/log/nginx/api.koldmarket.error.log;
}

