# =============================================================================
# EK Marketplace — Site Configuration
# Domains: www.koldmarket.co.uk | app.koldmarket.co.uk | api.koldmarket.co.uk
# =============================================================================
# Local development:
#   Add entries to /etc/hosts on your machine:
#     127.0.0.1  www.koldmarket.co.uk
#     127.0.0.1  app.koldmarket.co.uk
#     127.0.0.1  api.koldmarket.co.uk
#   Then curl -H "Host: www.koldmarket.co.uk" http://localhost/
#
# Production TODO:
#   - Obtain SSL certificates (Let's Encrypt / Certbot recommended)
#   - Add a server block listening on 443 ssl for each domain
#   - Add a redirect block (80 → 443) for each domain
#   - Uncomment the Strict-Transport-Security header below
#   - Point server_name to your actual public domains
# =============================================================================

# -----------------------------------------------------------------------------
# Shared proxy settings — referenced in each location block
# -----------------------------------------------------------------------------
# Place repeated proxy directives in a map or snippet file when you have many
# virtual hosts. For three hosts a simple repeat is clear enough.

# =============================================================================
# 1. www.koldmarket.co.uk → Next.js web service (web:3000)
# =============================================================================
server {
    listen 80;
    server_name www.koldmarket.co.uk;

    # Upload limit for marketplace images (matches client_max_body_size in nginx.conf)
    client_max_body_size 5M;

    # -------------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------------
    add_header X-Frame-Options        "SAMEORIGIN"              always;
    add_header X-Content-Type-Options "nosniff"                 always;
    add_header X-XSS-Protection       "1; mode=block"           always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    # TODO (production): uncomment after HTTPS is in place
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # -------------------------------------------------------------------------
    # Reverse proxy to Next.js
    # -------------------------------------------------------------------------
    location / {
        proxy_pass         http://web;
        proxy_http_version 1.1;

        # WebSocket support (required for Next.js HMR in development)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward real client information
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# =============================================================================
# 2. app.koldmarket.co.uk → Next.js web service (web:3000)
#    Separate subdomain for the authenticated application area.
#    Routes to the same container as www; differentiate at the app layer if needed.
# =============================================================================
server {
    listen 80;
    server_name app.koldmarket.co.uk;

    client_max_body_size 5M;

    # -------------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------------
    add_header X-Frame-Options        "SAMEORIGIN"              always;
    add_header X-Content-Type-Options "nosniff"                 always;
    add_header X-XSS-Protection       "1; mode=block"           always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    # TODO (production): uncomment after HTTPS is in place
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # -------------------------------------------------------------------------
    # Reverse proxy to Next.js
    # -------------------------------------------------------------------------
    location / {
        proxy_pass         http://web;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# =============================================================================
# 3. api.koldmarket.co.uk → Express API service (api:4000)
# =============================================================================
server {
    listen 80;
    server_name api.koldmarket.co.uk;

    # Allow larger payloads for bulk data or image upload endpoints
    client_max_body_size 5M;

    # -------------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------------
    add_header X-Frame-Options        "DENY"                    always;
    add_header X-Content-Type-Options "nosniff"                 always;
    add_header X-XSS-Protection       "1; mode=block"           always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    # TODO (production): uncomment after HTTPS is in place
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # -------------------------------------------------------------------------
    # Reverse proxy to Express API
    # -------------------------------------------------------------------------
    location / {
        proxy_pass         http://api;
        proxy_http_version 1.1;

        # WebSocket support (e.g. for real-time notifications via Socket.IO)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Slightly longer timeouts for API operations (file processing, AI calls)
        proxy_connect_timeout  60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Disable buffering for streaming / SSE responses
        proxy_buffering off;
    }
}
