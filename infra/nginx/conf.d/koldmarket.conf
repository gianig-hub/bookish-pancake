# =============================================================================
# infra/nginx/conf.d/koldmarket.conf
# Subdomain routing for EK Marketplace
#
# Subdomains:
#   www.koldmarket.co.uk  →  web container (Next.js, port 3000)
#   app.koldmarket.co.uk  →  web container (Next.js, port 3000)
#   api.koldmarket.co.uk  →  api container (Express, port 4000)
#
# Local development testing:
#   Add entries to /etc/hosts, e.g.:
#     127.0.0.1  www.koldmarket.co.uk
#     127.0.0.1  app.koldmarket.co.uk
#     127.0.0.1  api.koldmarket.co.uk
#
#   Then test with:
#     curl -H "Host: www.koldmarket.co.uk" http://localhost/
#     curl -H "Host: api.koldmarket.co.uk" http://localhost/health
#
# Production checklist:
#   1. Obtain SSL certificates (e.g. Let's Encrypt via Certbot)
#   2. Add HTTPS server blocks (listen 443 ssl)
#   3. Uncomment the HTTP → HTTPS redirect below each server_name
#   4. Uncomment the Strict-Transport-Security header once HTTPS is confirmed
# =============================================================================

# -----------------------------------------------------------------------------
# www.koldmarket.co.uk  →  Next.js web service
# -----------------------------------------------------------------------------
server {
  listen 80;
  server_name www.koldmarket.co.uk;

  # Production: redirect HTTP to HTTPS once SSL is in place.
  # Uncomment the line below and remove or guard the location block above it.
  # return 301 https://$server_name$request_uri;

  # Allow up to 5 MB request bodies (image uploads).
  # Matches MAX_FILE_SIZE in .env and client_max_body_size in nginx.conf.
  client_max_body_size 5M;

  # Security headers
  add_header X-Frame-Options         "SAMEORIGIN"                   always;
  add_header X-Content-Type-Options  "nosniff"                      always;
  add_header X-XSS-Protection        "1; mode=block"                always;
  add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
  # Uncomment once HTTPS is live and confirmed stable:
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location / {
    proxy_pass http://web_backend;

    # Forward original request information to the upstream service
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support — required for Next.js hot-module replacement in dev
    # and for any real-time features (e.g. live notifications) in production.
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

# -----------------------------------------------------------------------------
# app.koldmarket.co.uk  →  Next.js web service
# -----------------------------------------------------------------------------
server {
  listen 80;
  server_name app.koldmarket.co.uk;

  # Production: redirect HTTP to HTTPS once SSL is in place.
  # return 301 https://$server_name$request_uri;

  client_max_body_size 5M;

  add_header X-Frame-Options         "SAMEORIGIN"                   always;
  add_header X-Content-Type-Options  "nosniff"                      always;
  add_header X-XSS-Protection        "1; mode=block"                always;
  add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location / {
    proxy_pass http://web_backend;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

# -----------------------------------------------------------------------------
# api.koldmarket.co.uk  →  Express API service
# -----------------------------------------------------------------------------
server {
  listen 80;
  server_name api.koldmarket.co.uk;

  # Production: redirect HTTP to HTTPS once SSL is in place.
  # return 301 https://$server_name$request_uri;

  client_max_body_size 5M;

  add_header X-Frame-Options         "SAMEORIGIN"                   always;
  add_header X-Content-Type-Options  "nosniff"                      always;
  add_header X-XSS-Protection        "1; mode=block"                always;
  add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location / {
    proxy_pass http://api_backend;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Generous timeouts for API operations (file processing, AI calls, etc.)
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
  }
}
