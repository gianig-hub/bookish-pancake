# ============================================================
# koldmarket.conf — EK Marketplace Site Configuration
# ============================================================
# Handles routing for three subdomains:
#   www.koldmarket.co.uk  → Next.js web app (port 3000)
#   app.koldmarket.co.uk  → Next.js web app (port 3000)
#   api.koldmarket.co.uk  → Express API (port 4000)
#
# TODO: Replace placeholder domain with final production domain.
# TODO: Uncomment SSL blocks and run Certbot to get certificates.
# ============================================================


# ----------------------------------------------------------
# Upstream definitions
# Use container/service names when Nginx is in Docker.
# Use 127.0.0.1 when Nginx is on the host.
# ----------------------------------------------------------
upstream web_upstream {
    server 127.0.0.1:3000;
    # server web:3000;  # Use this if Nginx is inside Docker Compose
}

upstream api_upstream {
    server 127.0.0.1:4000;
    # server api:4000;  # Use this if Nginx is inside Docker Compose
}


# ----------------------------------------------------------
# Redirect HTTP → HTTPS for all domains
# Uncomment in production after SSL certificates are issued.
# ----------------------------------------------------------
# server {
#     listen 80;
#     server_name koldmarket.co.uk www.koldmarket.co.uk app.koldmarket.co.uk api.koldmarket.co.uk;
#     return 301 https://$host$request_uri;
# }


# ----------------------------------------------------------
# Main site: www.koldmarket.co.uk
# Serves the Next.js frontend.
# ----------------------------------------------------------
server {
    listen 80;
    # listen 443 ssl http2;  # Uncomment for HTTPS
    server_name koldmarket.co.uk www.koldmarket.co.uk;

    # SSL certificates (managed by Certbot)
    # ssl_certificate     /etc/letsencrypt/live/koldmarket.co.uk/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/koldmarket.co.uk/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;  # Enable with HTTPS

    # Max upload size (for listing images)
    client_max_body_size 20m;

    location / {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;

        # WebSocket support (required for Next.js hot reload in dev)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}


# ----------------------------------------------------------
# App subdomain: app.koldmarket.co.uk
# Can be used for the account/dashboard area.
# Currently proxies to the same Next.js app.
# TODO: Split into separate app when needed.
# ----------------------------------------------------------
server {
    listen 80;
    # listen 443 ssl http2;  # Uncomment for HTTPS
    server_name app.koldmarket.co.uk;

    # SSL certificates
    # ssl_certificate     /etc/letsencrypt/live/koldmarket.co.uk/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/koldmarket.co.uk/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20m;

    location / {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}


# ----------------------------------------------------------
# API subdomain: api.koldmarket.co.uk
# Proxies to the Express API backend.
# Rate limiting applied to /auth and general API routes.
# ----------------------------------------------------------
server {
    listen 80;
    # listen 443 ssl http2;  # Uncomment for HTTPS
    server_name api.koldmarket.co.uk;

    # SSL certificates
    # ssl_certificate     /etc/letsencrypt/live/koldmarket.co.uk/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/koldmarket.co.uk/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Note: X-Frame-Options not needed on API subdomain

    # Max body size for file uploads via API
    client_max_body_size 20m;

    # Rate limit: general API routes (30 requests/min per IP)
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;
        limit_conn conn_limit 20;

        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Rate limit: stricter limit on auth endpoints (5 requests/min per IP)
    location /api/auth/ {
        limit_req zone=login_limit burst=3 nodelay;
        limit_conn conn_limit 10;

        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Health check endpoint (no rate limit)
    location /health {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}
