# Main Nginx configuration for EK Marketplace
# This file sets up global Nginx settings and includes site configurations

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Worker connections - adjust based on expected traffic
events {
  worker_connections 1024;
}

http {
  # MIME types mapping
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ========================================================================
  # LOGGING CONFIGURATION
  # ========================================================================
  # Log format with details useful for debugging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  # ========================================================================
  # PERFORMANCE SETTINGS
  # ========================================================================
  # Use sendfile for efficient file transfers
  sendfile on;
  # Don't send partial frames
  tcp_nopush on;
  # Send data without delaying
  tcp_nodelay on;
  # Close idle connections after timeout
  keepalive_timeout 65;
  # Hash table size for type mappings
  types_hash_max_size 2048;

  # ========================================================================
  # FILE UPLOAD SETTINGS
  # ========================================================================
  # Maximum client request body size (5MB - matches MAX_FILE_SIZE in .env)
  # Increase this if you need to support larger file uploads
  client_max_body_size 5M;

  # ========================================================================
  # GZIP COMPRESSION
  # ========================================================================
  # Enable gzip compression for better performance
  gzip on;
  # Include Vary header for cache compatibility
  gzip_vary on;
  # Compress these content types
  gzip_types text/plain text/css text/xml text/javascript 
             application/x-javascript application/xml+rss 
             application/json;
  # Don't compress files smaller than 1KB
  gzip_min_length 1000;

  # ========================================================================
  # UPSTREAM SERVICE DEFINITIONS
  # ========================================================================
  # These point to Docker containers running the web and api services
  # The container names resolve via Docker's internal DNS

  # Web frontend (Next.js)
  upstream web_backend {
    server web:3000;
  }

  # API backend (Express)
  upstream api_backend {
    server api:4000;
  }

  # ========================================================================
  # INCLUDE SITE CONFIGURATIONS
  # ========================================================================
  # Include all .conf files in conf.d directory for individual sites
  include /etc/nginx/conf.d/*.conf;
}
