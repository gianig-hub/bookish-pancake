# ==============================================================================
# KoldMarket — Main Nginx Configuration
# ==============================================================================
# This file sets global Nginx settings.
# Site-specific config is in conf.d/koldmarket.conf
#
# For production:
#   - Enable SSL (see conf.d/koldmarket.conf comments)
#   - Run Let's Encrypt: certbot --nginx -d www.koldmarket.co.uk
#   - Uncomment HTTPS server blocks and redirect rules
# ==============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance settings
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;  # Don't expose Nginx version

    # File upload limit (covers marketplace image uploads)
    # Matches MAX_FILE_SIZE in .env — change both if needed
    client_max_body_size 5M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;

    # Upstream: Next.js web app
    upstream web_backend {
        server web:3000;
        keepalive 32;
    }

    # Upstream: Express API
    upstream api_backend {
        server api:4000;
        keepalive 32;
    }

    # Include site-specific server blocks
    include /etc/nginx/conf.d/*.conf;
}
