# =============================================================================
# EK Marketplace — Main Nginx Configuration
# =============================================================================
# This is the top-level Nginx config used inside the Docker container.
# Site-specific configs live in conf.d/ and are included at the bottom.
# =============================================================================

worker_processes auto;          # Scale workers to available CPU cores
worker_rlimit_nofile 65535;     # Max open file descriptors per worker

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;    # Max simultaneous connections per worker
    multi_accept on;            # Accept multiple connections at once
}

http {
    # -------------------------------------------------------------------------
    # MIME types & defaults
    # -------------------------------------------------------------------------
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Disable Nginx version in error pages and response headers
    server_tokens off;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # -------------------------------------------------------------------------
    # Upload / body size
    # Matched to MAX_FILE_SIZE in .env — increase if you allow larger uploads
    # -------------------------------------------------------------------------
    client_max_body_size 5M;

    # -------------------------------------------------------------------------
    # Upstream definitions
    # Service names match those declared in docker-compose.yml
    # -------------------------------------------------------------------------

    # Next.js frontend
    upstream web {
        server web:3000;
        keepalive 32;
    }

    # Express API
    upstream api {
        server api:4000;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # Include site-specific virtual host configs
    # -------------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}
