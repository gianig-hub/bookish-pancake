# =============================================================================
# infra/nginx/nginx.conf
# Main Nginx configuration for EK Marketplace
#
# Upstreams point to Docker container service names defined in docker-compose.yml.
# For local development, Nginx is accessible at http://localhost
# For production, add SSL certificates and uncomment the HTTPS redirect blocks
# in conf.d/koldmarket.conf.
# =============================================================================

user nginx;

# Let Nginx auto-detect the number of CPU cores
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  # Maximum simultaneous connections per worker
  worker_connections 1024;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ---------------------------------------------------------------------------
  # Logging
  # ---------------------------------------------------------------------------
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  # ---------------------------------------------------------------------------
  # Performance
  # ---------------------------------------------------------------------------
  sendfile       on;
  tcp_nopush     on;
  tcp_nodelay    on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  # Match MAX_FILE_SIZE from .env — allows image uploads up to 5 MB.
  # Increase this value if you later support larger files (e.g. video).
  client_max_body_size 5M;

  # ---------------------------------------------------------------------------
  # Gzip compression
  # Reduces bandwidth usage for text-based responses (HTML, CSS, JS, JSON).
  # ---------------------------------------------------------------------------
  gzip            on;
  gzip_vary       on;
  gzip_min_length 1000;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/x-javascript
    application/xml+rss
    application/json;

  # ---------------------------------------------------------------------------
  # Upstream definitions
  # These names match the service names in docker-compose.yml so Docker's
  # internal DNS resolves them automatically.
  # ---------------------------------------------------------------------------

  # Next.js frontend (web service, port 3000)
  upstream web_backend {
    server web:3000;
  }

  # Express API (api service, port 4000)
  upstream api_backend {
    server api:4000;
  }

  # ---------------------------------------------------------------------------
  # Site configurations
  # Each subdomain is defined in its own file under conf.d/
  # ---------------------------------------------------------------------------
  include /etc/nginx/conf.d/*.conf;
}
