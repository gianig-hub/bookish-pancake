# ============================================================
# Nginx Main Configuration — EK Marketplace
# ============================================================
# This is the main nginx.conf for the EK Marketplace VPS.
# In production, this replaces /etc/nginx/nginx.conf.
# Site-specific config is in koldmarket.conf.
# ============================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # ----------------------------------------------------------
    # Basic settings
    # ----------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens off;  # Hide Nginx version number

    # ----------------------------------------------------------
    # Buffer and timeout settings
    # Suitable for a marketplace with image uploads.
    # ----------------------------------------------------------
    client_max_body_size 20m;       # Allow image uploads up to 20MB per request
    client_body_buffer_size 128k;
    client_header_timeout 60s;
    client_body_timeout 60s;
    send_timeout 60s;

    # ----------------------------------------------------------
    # Gzip compression
    # Reduces response size for text-based assets.
    # ----------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ----------------------------------------------------------
    # Logging format
    # ----------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # ----------------------------------------------------------
    # Rate limiting zones
    # Protects against abuse and DDoS on critical endpoints.
    # ----------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ----------------------------------------------------------
    # Include site-specific configs
    # ----------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}
