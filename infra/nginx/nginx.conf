# =============================================================================
# nginx.conf — Main Nginx Configuration
# EK Marketplace / koldmarket.co.uk
#
# This is the top-level Nginx config. It sets worker behaviour, defines
# the upstream Docker service backends, enables compression, and includes
# any site-specific configs from conf.d/.
#
# For production, ensure Nginx is running inside Docker (see docker-compose.yml)
# and that upstream service names match the Docker Compose service names.
# =============================================================================

# Run as the default nginx user inside the container.
# Change if your Docker image uses a different user.
user  nginx;

# Automatically detect the number of CPU cores available.
worker_processes  auto;

# Error log location and verbosity.
# In production, change 'warn' to 'error' to reduce noise.
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    # Maximum simultaneous connections per worker.
    # 1024 is a sensible default; raise to 4096+ for high-traffic production.
    worker_connections  1024;
}

http {
    # -------------------------------------------------------------------------
    # MIME types
    # -------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    # Combined log format is the standard Apache-compatible format.
    # Add $request_time to help identify slow requests in production.
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile        on;   # Efficient file transfer for static assets
    tcp_nopush      on;   # Send HTTP response headers in one packet
    tcp_nodelay     on;   # Reduce latency for keep-alive connections
    keepalive_timeout  65;

    # -------------------------------------------------------------------------
    # Upload limit
    # -------------------------------------------------------------------------
    # Set to 5M to support image uploads in listings.
    # Should match MAX_FILE_SIZE in your .env file.
    # Raise to 20M or more if you support video or bulk uploads in future.
    client_max_body_size  5M;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    # Reduces bandwidth for text-based responses (HTML, JSON, CSS, JS).
    gzip  on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   4;      # 1 (fast) to 9 (best compression); 4–6 is a good balance
    gzip_min_length   256;    # Don't compress tiny responses
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # -------------------------------------------------------------------------
    # Upstream backends
    # -------------------------------------------------------------------------
    # These names must match the Docker Compose service names exactly.
    # If you rename services in docker-compose.yml, update these too.

    # Next.js frontend (web service)
    upstream web_backend {
        server web:3000;
        # Add more servers here for load balancing in production:
        # server web2:3000;
        # keepalive 16;
    }

    # Express API (api service)
    upstream api_backend {
        server api:4000;
        # Add more servers here for load balancing in production:
        # server api2:4000;
        # keepalive 16;
    }

    # -------------------------------------------------------------------------
    # Site configs
    # -------------------------------------------------------------------------
    # All virtual host / server block definitions live in conf.d/.
    include /etc/nginx/conf.d/*.conf;
}
