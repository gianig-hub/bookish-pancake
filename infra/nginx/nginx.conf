# ==============================================================================
# EK Marketplace — Nginx Main Configuration
# ==============================================================================
# This is the base nginx.conf for the reverse proxy.
# Site-specific configs live in /etc/nginx/conf.d/ (or sites-enabled/).
#
# Target: Ubuntu 24.04 LTS host-level Nginx (not containerised).
# ==============================================================================

user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    # Allow each worker to handle multiple connections efficiently
    multi_accept on;
}

http {
    # --------------------------------------------------------------------------
    # Basic Settings
    # --------------------------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off; # Hide Nginx version number

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --------------------------------------------------------------------------
    # Logging
    # --------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # --------------------------------------------------------------------------
    # Gzip Compression
    # --------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/html
        text/javascript
        text/plain
        text/xml;

    # --------------------------------------------------------------------------
    # Rate Limiting Zones
    # Apply these in site configs with: limit_req zone=general burst=20 nodelay;
    # --------------------------------------------------------------------------
    # General rate limit — 30 requests/second per IP
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    # Strict rate limit for auth endpoints — 5 requests/second per IP
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    # API rate limit — 20 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    # --------------------------------------------------------------------------
    # Security Headers (applied globally, can be overridden per site)
    # --------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # TODO: Tighten Content-Security-Policy per application in Phase 2
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';" always;

    # --------------------------------------------------------------------------
    # Upload / Client Body Size
    # Increase if listing images exceed 10 MB per request.
    # --------------------------------------------------------------------------
    client_max_body_size 20m;
    client_body_buffer_size 128k;

    # --------------------------------------------------------------------------
    # Proxy Settings (shared across all reverse proxy sites)
    # --------------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # WebSocket support (needed for Next.js HMR and future real-time features)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;

    # --------------------------------------------------------------------------
    # Include Site Configs
    # --------------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}
