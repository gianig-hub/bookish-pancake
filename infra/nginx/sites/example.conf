# ─────────────────────────────────────────────────────────────
# EK Marketplace – Nginx virtual host example
#
# Copy this file to /etc/nginx/sites-available/ekmarketplace
# and symlink to sites-enabled:
#   ln -s /etc/nginx/sites-available/ekmarketplace \
#         /etc/nginx/sites-enabled/ekmarketplace
#
# Replace "yourdomain.co.uk" with your actual domain.
# Run certbot to add SSL: certbot --nginx -d www.yourdomain.co.uk
# ─────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name www.yourdomain.co.uk app.yourdomain.co.uk api.yourdomain.co.uk;
    return 301 https://$host$request_uri;
}

# ─── www.yourdomain.co.uk – Next.js frontend ─────────────────
server {
    listen 443 ssl;
    server_name www.yourdomain.co.uk;

    # TODO: replace with real cert paths from certbot
    ssl_certificate     /etc/letsencrypt/live/www.yourdomain.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.yourdomain.co.uk/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─── api.yourdomain.co.uk – Express API ──────────────────────
server {
    listen 443 ssl;
    server_name api.yourdomain.co.uk;

    # TODO: replace with real cert paths from certbot
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.co.uk/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Rate limiting – TODO: tune limits for production
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    location / {
        limit_req zone=api burst=10 nodelay;
        proxy_pass         http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
