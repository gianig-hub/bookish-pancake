# ==============================================================================
# EK Marketplace — Nginx Site Configuration (Example)
# ==============================================================================
# Reverse proxy configuration for three subdomains:
#   www.ekmarketplace.co.uk  → web (Next.js, port 3000)
#   app.ekmarketplace.co.uk  → web (same app, authenticated area)
#   api.ekmarketplace.co.uk  → api (Express, port 4000)
#
# Before using this file:
#   1. Replace ekmarketplace.co.uk with your actual domain
#   2. Run certbot to obtain SSL certificates
#   3. Uncomment the HTTPS server blocks and remove the HTTP-only blocks
#   4. Test with: nginx -t
#   5. Reload with: systemctl reload nginx
# ==============================================================================


# ------------------------------------------------------------------------------
# Upstream definitions
# When using Docker Compose on the same host, the container names are
# accessible via Docker's internal DNS on a shared network.
# If Nginx runs on the host (not in Docker), use localhost + port.
# ------------------------------------------------------------------------------
upstream web_upstream {
    server localhost:3000;
    # keepalive 32;  # Uncomment for persistent connections (production)
}

upstream api_upstream {
    server localhost:4000;
    # keepalive 32;
}


# ==============================================================================
# www.ekmarketplace.co.uk — Public site (Next.js)
# ==============================================================================

# HTTP → HTTPS redirect (uncomment after SSL is configured)
# server {
#     listen 80;
#     server_name ekmarketplace.co.uk www.ekmarketplace.co.uk;
#     return 301 https://www.ekmarketplace.co.uk$request_uri;
# }

# HTTP (temporary — use for initial setup before SSL)
server {
    listen 80;
    server_name ekmarketplace.co.uk www.ekmarketplace.co.uk;

    # Redirect bare domain to www
    if ($host = ekmarketplace.co.uk) {
        return 301 $scheme://www.ekmarketplace.co.uk$request_uri;
    }

    # Rate limiting — general traffic
    limit_req zone=general burst=50 nodelay;

    location / {
        proxy_pass http://web_upstream;
    }

    # Cache static assets served by Next.js
    location /_next/static/ {
        proxy_pass http://web_upstream;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Block access to hidden files (e.g. .env, .git)
    location ~ /\. {
        deny all;
    }
}

