# EK Marketplace — example site config
#
# Covers three virtual hosts:
#   www.domain.co.uk  → Next.js web app (port 3000)
#   app.domain.co.uk  → Next.js web app (port 3000)  [optional app subdomain]
#   api.domain.co.uk  → Express API (port 4000)
#
# Replace 'domain.co.uk' with your actual domain.
# TODO: Add SSL server blocks after running Certbot.
# TODO: Add HTTP → HTTPS redirects in production.

# --------------------------------------------------------------------------
# Upstream definitions
# --------------------------------------------------------------------------
upstream web_upstream {
    server web:3000;
    # TODO: Add additional instances here for horizontal scaling
}

upstream api_upstream {
    server api:4000;
    # TODO: Add additional instances here for horizontal scaling
}

# --------------------------------------------------------------------------
# www.domain.co.uk + domain.co.uk → Next.js web app
# --------------------------------------------------------------------------
server {
    listen 80;
    server_name domain.co.uk www.domain.co.uk;

    # TODO: Uncomment after Certbot adds SSL:
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;

        # Required for WebSocket support (Next.js HMR in dev)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Static files from Next.js public folder — served directly
    location /_next/static/ {
        proxy_pass http://web_upstream;
        proxy_cache_bypass $http_upgrade;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# --------------------------------------------------------------------------
# app.domain.co.uk → Same web app (optional separate subdomain)
# --------------------------------------------------------------------------
server {
    listen 80;
    server_name app.domain.co.uk;

    location / {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --------------------------------------------------------------------------
# api.domain.co.uk → Express API
# --------------------------------------------------------------------------
server {
    listen 80;
    server_name api.domain.co.uk;

    location / {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Larger timeout for AI endpoints (TODO: when AI routes are added)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Reject requests with oversized bodies at the API gateway
        client_max_body_size 5M;
    }
}

