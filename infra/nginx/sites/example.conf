# EK Marketplace — Nginx Site Config Example
# -----------------------------------------------
# Reverse proxy config for:
#   www.ekmarketplace.co.uk  → Next.js web (port 3000)
#   api.ekmarketplace.co.uk  → Express API (port 4000)
#
# TODO: Replace domain names with your actual domain.
# TODO: Add SSL certificates (Let's Encrypt / Certbot).
# TODO: Add rate limiting directives for auth endpoints.
#
# Copy to /etc/nginx/conf.d/ekmarketplace.conf on the server.

# -------------------------------------------------------
# www.ekmarketplace.co.uk — Next.js Frontend
# -------------------------------------------------------
server {
    listen 80;
    server_name www.ekmarketplace.co.uk ekmarketplace.co.uk;

    # TODO: Uncomment after certbot SSL setup
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://ek-web:3000;
        proxy_http_version 1.1;

        # WebSocket support (Next.js HMR in dev)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# -------------------------------------------------------
# api.ekmarketplace.co.uk — Express API
# -------------------------------------------------------
server {
    listen 80;
    server_name api.ekmarketplace.co.uk;

    # TODO: Uncomment after certbot SSL setup
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://ek-api:4000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 30s;

        # Security: do not expose API internals
        proxy_hide_header X-Powered-By;
    }

    # Health check endpoint — allow from anywhere, no auth
    location /health {
        proxy_pass http://ek-api:4000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}

