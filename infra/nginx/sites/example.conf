# ==============================================================================
# app.ekmarketplace.co.uk — Authenticated account area
# (Optional — can point to the same Next.js app as www)
# ==============================================================================
server {
    listen 80;
    server_name app.ekmarketplace.co.uk;

    limit_req zone=general burst=50 nodelay;

    location / {
        proxy_pass http://web_upstream;
    }

    location ~ /\. {
        deny all;
    }
}


# ==============================================================================
# api.ekmarketplace.co.uk — Express API backend
# ==============================================================================
server {
    listen 80;
    server_name api.ekmarketplace.co.uk;

    # API rate limiting — stricter than web
    limit_req zone=api burst=30 nodelay;

    # Tighter upload limit on API (listing image uploads go through here)
    client_max_body_size 20m;

    # Strict rate limit on auth endpoints
    location /auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://api_upstream;
    }

    location / {
        proxy_pass http://api_upstream;
    }

    # Block direct access to internal paths
    location ~ ^/(internal|health|metrics) {
        # TODO: Restrict to trusted IPs only in production
        # allow 10.0.0.0/8;
        # deny all;
        proxy_pass http://api_upstream;
    }

    location ~ /\. {
        deny all;
    }
}


